name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      # Pas d'appel réseau GitHub à l'import, base/données dans un dossier jetable.
      FUNDUS_SKIP_REMOTE: "1"
      FUNDUS_ADMIN_PASSWORD: "ci-admin-pw"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run test suite
        run: pytest
